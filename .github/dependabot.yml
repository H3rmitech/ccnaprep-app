version: 2
updates:
  # Keep npm dependencies patched
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps):"

  # Keep the pinned GitHub Actions SHAs current (security + bug fixes)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
